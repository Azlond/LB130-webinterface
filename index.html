<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Let there be Light!</title>
    <link rel="stylesheet" href="src/css/light.css" />
    <link rel="stylesheet" href="src/css/colorWheel.css" />
  </head>

  <body>
    <div id="tabs">
      <button id="whiteLightButton" class="tabButton">White</button>
      <button id="powerButton"><span class="iec_power">&#x23FB;</span></button>
      <button id="colorLightButton" class="tabButton">Color</button>
    </div>
    <div id="containerWrapper">
      <div id="initTab" class="tab">
        <div class="spinner">
          <div class="bounce1"></div>
          <div class="bounce2"></div>
          <div class="bounce3"></div>
        </div>
      </div>
      <div id="whiteLightContainer" class="tab">
        <h1>White Light</h1>
        <div id="whiteLightWrapper">
          <div id="whiteLightColorTemp">
            <object
              data="/images/bulb.svg"
              type="image/svg+xml"
              id="whiteLightColorTempSVG"
            ></object>
            <label for="colorTempSlider" class="bulbLabel">Select the color temperature</label>
            <input id="colorTempSlider" type="range" min="2500" max="9000" step="100" />
            <input type="text" id="colorTempBox" readonly />
          </div>
          <div id="whiteLightBrightness">
            <object
              data="/images/bulb.svg"
              type="image/svg+xml"
              id="whiteLightBrightnessSVG"
            ></object>
            <label for="brightnessSlider" class="bulbLabel">Select the brightness</label>
            <input id="brightnessSlider" type="range" min="1" max="100" step="1" />
            <input type="text" id="brightnessBox" readonly />
          </div>
        </div>
      </div>
      <div id="colorLightContainer" class="tab">
        <h1>Color Light</h1>
        <div id="colorLightWrapper">
          <div id="colorLight">
            <object data="/images/bulb.svg" type="image/svg+xml" id="colorLightSVG"></object>
          </div>
          <div id="colorWheel">
            <div class="colorpicker">
              <canvas id="picker" width="300" height="300"></canvas>
              <div class="controls">
                <div>
                  <label for="rVal">R</label>
                  <input type="text" id="rVal" readonly />
                </div>
                <div>
                  <label for="gVal">G</label>
                  <input type="text" id="gVal" readonly />
                </div>
                <div>
                  <label for="bVal">B</label>
                  <input type="text" id="bVal" readonly />
                </div>
                <div>
                  <label for="rgbVal">RGB</label>
                  <input type="text" id="rgbVal" readonly />
                </div>
                <div>
                  <label for="hexVal">HEX</label>
                  <input type="text" id="hexVal" readonly />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/js/light.ts"></script>
  </body>
</html>
